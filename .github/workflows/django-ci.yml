name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-only-key-not-used-anywhere-real
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (MySQL client libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check (fails the build on errors)
        run: python manage.py check

      - name: Verify migrations are in sync with models
        run: python manage.py makemigrations --check --dry-run
